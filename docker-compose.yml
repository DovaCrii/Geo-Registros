services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geo-registros-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo_registros
      POSTGRES_USER: geo_registros
      POSTGRES_PASSWORD: geo_registros
    ports:
      - "5432:5432"
    volumes:
      - geo_registros_db_data:/var/lib/postgresql/data

volumes:
  geo_registros_db_data:
